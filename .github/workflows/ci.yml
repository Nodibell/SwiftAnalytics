name: SwiftAnalytics CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFT_PACKAGE_DIR: "."
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  MLX_DEVICE: cpu

jobs:
  build-and-test:
    name: Build & Test (macOS / Apple Silicon)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Cache Swift Package Manager dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.SWIFT_PACKAGE_DIR }}/.build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-
      
      - name: Build (debug)
        run: swift build -v
        working-directory: ${{ env.SWIFT_PACKAGE_DIR }}

      - name: Run tests with code coverage
        run: swift test --enable-code-coverage -v --skip SwiftLLMTests
        working-directory: ${{ env.SWIFT_PACKAGE_DIR }}

      - name: Export LCOV coverage report
        run: |
          BUILD_DIR=$(swift build --show-bin-path -c debug)
          PROFDATA="${{ env.SWIFT_PACKAGE_DIR }}/.build/debug/codecov/default.profdata"
          TEST_BINS=$(find "$BUILD_DIR" -name "*.xctest" -type d 2>/dev/null | while read d; do echo "$d/Contents/MacOS/$(basename "${d%.xctest}")"; done | tr '\n' ' ')
          if [ -n "$TEST_BINS" ]; then
            xcrun llvm-cov export -format="lcov" -instr-profile="$PROFDATA" $TEST_BINS > coverage.lcov 2>/dev/null || true
          fi
        working-directory: ${{ env.SWIFT_PACKAGE_DIR }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ${{ env.SWIFT_PACKAGE_DIR }}/coverage.lcov
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  performance-check:
    name: Performance Regression Check
    runs-on: macos-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: ${{ env.SWIFT_PACKAGE_DIR }}/Benchmarks/Python/requirements.txt

      - name: Install Python benchmark dependencies
        run: |
          pip install --upgrade pip
          pip install -r Benchmarks/Python/requirements.txt
        working-directory: ${{ env.SWIFT_PACKAGE_DIR }}

      - name: Build Swift benchmarks (release)
        run: swift build -c release --product SwiftAnalyticsBenchmarks
        working-directory: ${{ env.SWIFT_PACKAGE_DIR }}

      - name: Run Swift benchmarks
        run: |
          mkdir -p Benchmarks/Results
          swift run -c release SwiftAnalyticsBenchmarks --json Benchmarks/Results/swift_results.json
        working-directory: ${{ env.SWIFT_PACKAGE_DIR }}

      - name: Run Python benchmarks
        run: |
          python3 Benchmarks/Python/benchmarks.py --json Benchmarks/Results/python_results.json
        working-directory: ${{ env.SWIFT_PACKAGE_DIR }}

      - name: Compare results & check for regressions
        run: |
          python3 Benchmarks/Python/compare.py Benchmarks/Results/swift_results.json Benchmarks/Results/python_results.json --regression-threshold 1.2
        working-directory: ${{ env.SWIFT_PACKAGE_DIR }}

      - name: Upload benchmark results as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results-${{ github.run_id }}
          path: ${{ env.SWIFT_PACKAGE_DIR }}/Benchmarks/Results/
          retention-days: 30