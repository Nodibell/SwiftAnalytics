<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting…</title>
  <script>
    // GitHub Pages SPA fallback: redirect to landing page
    var seg = window.location.pathname.replace('/SwiftSci', '');
    if (seg && seg !== '/' && seg.startsWith('/documentation/')) {
      // pass through — let the browser try the direct path
      window.location.replace(window.location.href);
    } else {
      window.location.replace('/SwiftSci/');
    }
  </script>
  <meta http-equiv="refresh" content="0; url=/SwiftSci/">
  <link rel="canonical" href="/SwiftSci/">
</head>
<body>
  <p>Redirecting to <a href="/SwiftSci/">SwiftSci documentation</a>…</p>
</body>
</html>
